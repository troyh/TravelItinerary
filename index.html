<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (navigator.standalone) {
        document.querySelector('meta[name="viewport"]').content = 'width=device-width,initial-scale=1.0,user-scalable=no';
        // Reload after 15 minutes in the background so content stays fresh
        var _hiddenAt = 0;
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) { _hiddenAt = Date.now(); }
          else if (_hiddenAt && Date.now() - _hiddenAt > 15 * 60 * 1000) { window.location.reload(); }
        });
      }
    </script>
    <title>Travel Itinerary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface2: #f8f9fb;
        --surface3: #f0f4f8;
        --text: #0e1014;
        --text-muted: #5c6470;
        --text-faint: #9ba1ac;
        --border: #e2e5ea;
        --border-soft: #eef0f3;
        --accent: #0b3d6b;
        --accent-soft: #e8f1f9;
        --accent-hover: #0a3360;
        --amber: #f5b544;
        --amber-soft: #fff7ed;
        --red: #dc2626;
        --red-soft: #fef2f2;
        --red-border: #fecaca;
        --green: #16a34a;
        --green-soft: #f0fdf4;
        --font: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #ffffff;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #0e1014;
      }
      input, select, textarea { font-size: 16px !important; font-family: inherit; }
      @media (max-width: 640px) {
        .picker-sidebar { display: none !important; }
        .picker-main { padding: 24px 16px 60px !important; }

        /* Day view: collapse to single column */
        .day-expanded-grid {
          grid-template-columns: 1fr !important;
          gap: 0 !important;
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
        .day-expanded-right {
          border-left: none !important;
          padding-left: 0 !important;
          border-top: 1px solid #e2e5ea;
          padding-top: 20px;
          margin-top: 8px;
        }
        /* Show mobile date box, hide desktop large number */
        .day-date-desktop { display: none !important; }
        .day-date-mobile  { display: flex !important; }
        /* Hide desktop standalone title (shown in mobile date row instead) */
        .day-title-desktop { display: none !important; }
      }
      /* Hidden by default; mobile media query below reveals them */
      .day-date-mobile { display: none; }

      @media (min-width: 641px) {
        .picker-settings-btn { display: none !important; }
        /* Hide compact header on desktop when day is open */
        .day-compact-open { display: none !important; }
        /* Show collapse button on desktop */
        .day-collapse-btn { display: block !important; }
      }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Travel Itinerary" />
    <meta name="theme-color" content="#0b3d6b" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
