<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (navigator.standalone) {
        document.querySelector('meta[name="viewport"]').content = 'width=device-width,initial-scale=1.0,user-scalable=no';
        // Reload after 15 minutes in the background so content stays fresh
        var _hiddenAt = 0;
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) { _hiddenAt = Date.now(); }
          else if (_hiddenAt && Date.now() - _hiddenAt > 15 * 60 * 1000) { window.location.reload(); }
        });
      }
    </script>
    <title>Travel Itinerary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface2: #f8f9fb;
        --surface3: #f0f4f8;
        --text: #0e1014;
        --text-muted: #5c6470;
        --text-faint: #9ba1ac;
        --border: #e2e5ea;
        --border-soft: #eef0f3;
        --accent: #0b3d6b;
        --accent-soft: #e8f1f9;
        --accent-hover: #0a3360;
        --amber: #f5b544;
        --amber-soft: #fff7ed;
        --red: #dc2626;
        --red-soft: #fef2f2;
        --red-border: #fecaca;
        --green: #16a34a;
        --green-soft: #f0fdf4;
        --font: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #ffffff;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #0e1014;
      }
      input, select, textarea { font-size: 16px !important; font-family: inherit; }
      /* Inline-edit fields that need their own font size */
      .inline-title-input  { font-size: clamp(1.6rem,4vw,2.4rem) !important; font-weight: 700 !important; letter-spacing: -.03em !important; }
      .inline-subtitle-input { font-size: .9rem !important; }
      .inline-notes-textarea { font-size: 13px !important; }
      .inline-day-title-input { font-size: 17px !important; font-weight: 600 !important; letter-spacing: -.012em !important; }
      .inline-day-notes-textarea { font-size: 12px !important; resize: vertical !important; min-height: 60px !important; }
      @media (max-width: 640px) {
        .picker-sidebar { display: none !important; }
        .picker-main { padding: 24px 16px 60px !important; }

        /* Day view: collapse to single column */
        .day-expanded-grid {
          grid-template-columns: 1fr !important;
          gap: 0 !important;
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
        .day-expanded-right {
          border-left: none !important;
          padding-left: 0 !important;
          border-top: 1px solid #e2e5ea;
          padding-top: 20px;
          margin-top: 8px;
        }
        /* Show mobile date box, hide desktop large number */
        .day-date-desktop { display: none !important; }
        .day-date-mobile  { display: flex !important; }
        /* Hide desktop standalone title (shown in mobile date row instead) */
        .day-title-desktop { display: none !important; }
      }
      /* Hidden by default; mobile media query below reveals them */
      .day-date-mobile { display: none; }

      @media (min-width: 641px) {
        .picker-settings-btn { display: none !important; }
      }

      /* ── Mobile drawer slide-in ──────────────────────────────── */
      @keyframes drawerSlideIn {
        from { transform: translateX(-100%); }
        to   { transform: translateX(0); }
      }

      /* ── Add-item UX ─────────────────────────────────────────── */

      /* Button bar: visible on desktop, hidden on mobile */
      .day-add-bar { display: flex; }
      .day-add-fab { display: none !important; }

      /* Backdrop shared by panel and sheet */
      .add-panel-backdrop, .add-sheet-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 900;
      }

      /* Desktop: right-side drawer */
      .add-panel {
        position: fixed; top: 0; right: 0; height: 100vh; width: 440px; max-width: 100vw;
        background: #fff; z-index: 901; display: flex; flex-direction: column;
        box-shadow: -4px 0 32px rgba(0,0,0,0.14);
        animation: slideInRight 0.22s cubic-bezier(0.2,0,0,1);
      }
      @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }

      .add-panel-header {
        display: flex; align-items: center; gap: 6px; padding: 14px 18px;
        border-bottom: 1px solid #e2e5ea; font-size: 15px; font-weight: 600; flex-shrink: 0;
      }
      .add-panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
      .add-panel-back {
        background: none; border: none; cursor: pointer; color: #9ba1ac;
        font-size: 22px; line-height: 1; padding: 0 4px 0 0; flex-shrink: 0;
      }
      .add-panel-close {
        background: none; border: none; cursor: pointer; color: #9ba1ac;
        font-size: 22px; line-height: 1; padding: 0; margin-left: auto; flex-shrink: 0;
      }

      @media (max-width: 640px) {
        .day-add-bar { display: none !important; }
        .day-add-fab {
          display: flex !important; align-items: center; justify-content: center;
          width: 48px; height: 48px; border-radius: 50%; border: none;
          background: #0b3d6b; color: #fff; font-size: 26px; line-height: 1;
          cursor: pointer; margin: 16px 0 8px auto;
          box-shadow: 0 4px 16px rgba(11,61,107,0.3);
          font-family: inherit;
        }
        .add-sheet {
          position: fixed; bottom: 0; left: 0; right: 0; z-index: 901;
          background: #fff; border-radius: 16px 16px 0 0; padding: 10px 0 env(safe-area-inset-bottom, 24px);
          animation: slideUp 0.22s cubic-bezier(0.2,0,0,1);
        }
        .add-sheet-handle {
          width: 36px; height: 4px; background: #e2e5ea; border-radius: 2px; margin: 0 auto 14px;
        }
        .add-sheet-row {
          display: flex; align-items: center; gap: 14px; width: 100%;
          padding: 14px 20px; background: none; border: none; border-bottom: 1px solid #f0f1f3;
          cursor: pointer; font-family: inherit; text-align: left;
        }
        .add-sheet-row:last-child { border-bottom: none; }
        .add-sheet-row-icon {
          width: 40px; height: 40px; border-radius: 10px; background: #e8f1f9;
          display: flex; align-items: center; justify-content: center; color: #0b3d6b; flex-shrink: 0;
        }
        /* On mobile the panel becomes a bottom sheet */
        .add-panel {
          top: auto; bottom: 0; left: 0; right: 0; width: 100%; height: auto;
          max-height: 92vh; border-radius: 16px 16px 0 0;
          box-shadow: 0 -4px 32px rgba(0,0,0,0.14);
          animation: slideUp 0.22s cubic-bezier(0.2,0,0,1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Travel Itinerary" />
    <meta name="theme-color" content="#0b3d6b" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
