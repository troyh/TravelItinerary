<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (navigator.standalone) {
        document.querySelector('meta[name="viewport"]').content = 'width=device-width,initial-scale=1.0,user-scalable=no';
        // Reload after 15 minutes in the background so content stays fresh
        var _hiddenAt = 0;
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) { _hiddenAt = Date.now(); }
          else if (_hiddenAt && Date.now() - _hiddenAt > 15 * 60 * 1000) { window.location.reload(); }
        });
      }
    </script>
    <title>Travel Itinerary</title>
    <style>
      html, body { margin: 0; background: #0b1929; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
      input, select, textarea { font-size: 16px !important; }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Travel Itinerary" />
    <meta name="theme-color" content="#0b1929" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
